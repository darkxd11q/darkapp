<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#111b21"/>
<title>ChatApp</title>
<style>
/* ── RESET & BASE ─────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#111b21;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

/* ── LAYOUT ──────────────────────────────────────── */
#app{display:flex;height:100dvh;width:100%;overflow:hidden;}

/* ── LOGIN ───────────────────────────────────────── */
#login-screen{
  position:fixed;inset:0;z-index:100;
  background:#111b21;
  display:flex;align-items:center;justify-content:center;
}
.login-box{
  background:#202c33;border-radius:16px;padding:40px 32px;
  width:min(360px,92vw);text-align:center;
}
.login-box .logo{font-size:3rem;margin-bottom:12px;}
.login-box h1{color:#e9edef;font-size:1.4rem;margin-bottom:6px;}
.login-box p{color:#8696a0;font-size:.85rem;margin-bottom:28px;}
.login-box input{
  width:100%;padding:14px 16px;border-radius:10px;
  border:2px solid #2a3942;background:#2a3942;
  color:#e9edef;font-size:1rem;outline:none;
  transition:border-color .2s;
}
.login-box input:focus{border-color:#00a884;}
.login-box button{
  margin-top:14px;width:100%;padding:14px;border-radius:10px;border:none;
  background:#00a884;color:#fff;font-size:1rem;font-weight:600;
  cursor:pointer;transition:background .2s;
}
.login-box button:hover{background:#02906f;}

/* ── SIDEBAR ─────────────────────────────────────── */
#sidebar{
  width:340px;min-width:340px;
  background:#111b21;
  display:flex;flex-direction:column;
  border-right:1px solid #2a3942;
  transition:transform .25s;
}
#sidebar-header{
  background:#202c33;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
}
#my-avatar{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.95rem;color:#fff;flex-shrink:0;
}
#my-name{color:#e9edef;font-size:1rem;font-weight:600;flex:1;}
#online-dot{width:9px;height:9px;border-radius:50%;background:#00a884;flex-shrink:0;}

.sidebar-section-title{
  color:#8696a0;font-size:.72rem;letter-spacing:.8px;text-transform:uppercase;
  padding:16px 16px 6px;
}

#user-list{flex:1;overflow-y:auto;}
#user-list::-webkit-scrollbar{width:4px;}
#user-list::-webkit-scrollbar-thumb{background:#2a3942;border-radius:2px;}

.user-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;cursor:pointer;
  border-bottom:1px solid #1c2931;
  transition:background .15s;position:relative;
}
.user-item:hover,.user-item.active{background:#202c33;}
.user-item .avatar{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:1.1rem;color:#fff;position:relative;
}
.user-item .avatar .status-ring{
  position:absolute;bottom:1px;right:1px;
  width:12px;height:12px;border-radius:50%;
  background:#00a884;border:2px solid #111b21;
}
.user-item .info{flex:1;min-width:0;}
.user-item .name{color:#e9edef;font-size:.95rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-item .preview{color:#8696a0;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.user-item .meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.user-item .time{color:#8696a0;font-size:.72rem;}
.unread-badge{
  background:#00a884;color:#fff;font-size:.7rem;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
}

#empty-sidebar{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:#8696a0;font-size:.9rem;text-align:center;padding:24px;
}

/* ── CHAT PANEL ──────────────────────────────────── */
#chat-panel{
  flex:1;display:flex;flex-direction:column;
  background:#0b141a;position:relative;min-width:0;
}

/* Wallpaper */
#chat-panel::before{
  content:"";position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23182229' fill-opacity='0.6'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

/* Hiç sohbet seçilmemişse */
#no-chat{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#8696a0;text-align:center;padding:32px;position:relative;z-index:1;
}
#no-chat .big-icon{font-size:5rem;margin-bottom:16px;opacity:.3;}
#no-chat h2{font-size:1.3rem;margin-bottom:8px;color:#e9edef;opacity:.5;}
#no-chat p{font-size:.85rem;opacity:.5;}

/* Chat header */
#chat-header{
  background:#202c33;padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  z-index:10;position:relative;
}
#back-btn{
  display:none;background:none;border:none;color:#aebac1;
  font-size:1.4rem;cursor:pointer;padding:4px;
}
#chat-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.9rem;color:#fff;
}
#chat-info{flex:1;min-width:0;}
#chat-name{color:#e9edef;font-size:.95rem;font-weight:600;}
#chat-status{color:#8696a0;font-size:.78rem;margin-top:1px;}
#call-btn{
  background:none;border:none;color:#aebac1;font-size:1.4rem;
  cursor:pointer;padding:8px;border-radius:50%;transition:background .15s;
}
#call-btn:hover{background:#2a3942;}

/* Messages area */
#messages{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:4px;
  position:relative;z-index:1;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:4px;}
#messages::-webkit-scrollbar-thumb{background:#2a3942;border-radius:2px;}

.msg-row{display:flex;margin-bottom:2px;}
.msg-row.mine{justify-content:flex-end;}
.msg-row.theirs{justify-content:flex-start;}

.bubble{
  max-width:75%;padding:8px 12px 6px;border-radius:8px;
  position:relative;word-break:break-word;
}
.mine .bubble{
  background:#005c4b;color:#e9edef;
  border-bottom-right-radius:2px;
}
.theirs .bubble{
  background:#202c33;color:#e9edef;
  border-bottom-left-radius:2px;
}
.bubble .text{font-size:.93rem;line-height:1.5;}
.bubble .meta{
  display:flex;justify-content:flex-end;align-items:center;gap:4px;
  margin-top:2px;
}
.bubble .t{color:#8696a0;font-size:.68rem;}
.mine .bubble .t{color:#8baebb;}

.date-divider{
  text-align:center;margin:12px 0;
  color:#8696a0;font-size:.75rem;
}
.date-divider span{
  background:#182229;padding:4px 12px;border-radius:8px;
}

/* Typing indicator */
#typing-indicator{
  display:none;padding:4px 16px 2px;
  color:#8696a0;font-size:.8rem;position:relative;z-index:1;
}

/* Input bar */
#input-bar{
  background:#202c33;padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  position:relative;z-index:10;
}
#msg-input{
  flex:1;background:#2a3942;border:none;border-radius:24px;
  padding:11px 18px;color:#e9edef;font-size:.95rem;
  outline:none;resize:none;max-height:120px;overflow-y:auto;
  line-height:1.4;
}
#msg-input::placeholder{color:#8696a0;}
#send-btn{
  background:#00a884;border:none;width:44px;height:44px;
  border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;font-size:1.1rem;
}
#send-btn:hover{background:#02906f;}

/* ── CALL OVERLAY ─────────────────────────────────── */
#call-overlay{
  position:fixed;inset:0;z-index:200;
  background:linear-gradient(160deg,#1a3040,#0d2032);
  display:none;flex-direction:column;align-items:center;justify-content:space-between;
  padding:60px 24px 48px;
}
#call-overlay.show{display:flex;}
#call-remote-name{color:#fff;font-size:1.6rem;font-weight:600;margin-bottom:8px;}
#call-status-text{color:#aebac1;font-size:.9rem;}
#call-avatar-big{
  width:100px;height:100px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;font-weight:700;color:#fff;
  box-shadow:0 0 0 12px rgba(255,255,255,.08),0 0 0 24px rgba(255,255,255,.04);
}
.call-buttons{display:flex;gap:40px;align-items:center;}
.call-btn{
  width:64px;height:64px;border-radius:50%;border:none;
  cursor:pointer;font-size:1.6rem;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.call-btn:active{transform:scale(.9);}
#btn-accept{background:#00a884;}
#btn-reject,#btn-end{background:#f13838;}
#btn-mute{background:#2a3942;color:#e9edef;}
#btn-mute.muted{background:#f13838;}

/* Incoming call */
#incoming-call{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:201;background:#202c33;border-radius:16px;
  padding:20px 28px;text-align:center;min-width:280px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  display:none;
}
#incoming-call.show{display:block;}
#incoming-name{color:#e9edef;font-size:1.1rem;font-weight:600;margin-bottom:4px;}
#incoming-sub{color:#8696a0;font-size:.82rem;margin-bottom:20px;}
.incoming-btns{display:flex;gap:24px;justify-content:center;}
.inc-btn{
  width:56px;height:56px;border-radius:50%;border:none;
  cursor:pointer;font-size:1.5rem;
  display:flex;align-items:center;justify-content:center;
}

/* ── MOBILE ──────────────────────────────────────── */
@media(max-width:640px){
  #sidebar{
    width:100%;min-width:100%;
    position:absolute;inset:0;z-index:10;
    transform:translateX(0);
  }
  #sidebar.hidden{transform:translateX(-100%);}
  #chat-panel{position:absolute;inset:0;z-index:10;transform:translateX(100%);}
  #chat-panel.show{transform:translateX(0);}
  #back-btn{display:block;}
}

/* Scrollbar genel */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a3942;border-radius:3px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">💬</div>
    <h1>ChatApp'e Hoş Geldin</h1>
    <p>Kullanıcı adını girerek başla</p>

<!-- UYGULAMA -->
<div id="app" style="display:none;">

  <!-- SIDEBAR -->
  <div id="sidebar">

      <div id="my-avatar"></div>
      <span id="my-name"></span>

      <div id="empty-sidebar">Henüz kimse çevrimiçi değil.<br/>Arkadaşların aynı adrese bağlansın!</div>

  </div>

    <div id="chat-header" style="display:none;">
      <button id="back-btn">‹</button>
      <div id="chat-avatar"></div>
      <div id="chat-info">
        <div id="chat-name"></div>
        <div id="chat-status">çevrimiçi</div>
      </div>
      <button id="call-btn" title="Sesli Ara">📞</button>
    </div>

    <div id="messages" style="display:none;"></div>
    <div id="typing-indicator"></div>
    <div id="input-bar" style="display:none;">
      <textarea id="msg-input" placeholder="Mesaj yaz..." rows="1"></textarea>
      <button id="send-btn">➤</button>

<!-- GELEN ARAMA -->

</div>

<!-- ARAMA EKRANI -->
<div id="call-overlay">
  <div style="text-align:center;">
    <div id="call-remote-name"></div>
    <div id="call-status-text">Bağlanıyor...</div>
  </div>
  <div id="call-avatar-big"></div>

    <button class="call-btn" id="btn-mute" title="Sessiz">🎙️</button>
    <button class="call-btn" id="btn-end" title="Kapat">📵</button>
  </div>
</div>

<audio id="remote-audio" autoplay playsinline></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let socket;
let me = null;                  // {id, username, avatar}
let activeChat = null;          // {id, username, avatar}
let unreadCounts = {};          // { userId: count }
let lastMessages = {};          // { userId: msgObj }
let typingTimers = {};
let activeCallId = null;
let localStream = null;
let peerConnection = null;
let isMuted = false;

// STUN sunucuları (ücretsiz — Google)
const ICE_SERVERS = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
    { urls: "stun:stun2.l.google.com:19302" },
  ],
};

// ═══════════════════════════════════════════════════
//  YARDIMCI FONKSİYONLAR
// ═══════════════════════════════════════════════════
function initials(name) {
  return name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
}

function formatDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  if(d.toDateString()===today.toDateString()) return "Bugün";
  const yest = new Date(today); yest.setDate(today.getDate()-1);
  if(d.toDateString()===yest.toDateString()) return "Dün";
  return d.toLocaleDateString("tr-TR");
}

function makeAvatar(el, color, name) {
  el.style.background = color;
  el.textContent = initials(name);
}

// ═══════════════════════════════════════════════════
//  SOCKET BAĞLANTI
// ═══════════════════════════════════════════════════
function connectSocket(username) {
  socket = io();

  socket.on("connect", () => {
    socket.emit("register", { username });
  });

  socket.on("registered", ({ user }) => {
    me = user;
    showApp(user);
  });

  socket.on("user_list", (users) => {
    users.forEach(u => renderUserItem(u));
    checkEmptySidebar();
  });

  socket.on("user_joined", (user) => {
    renderUserItem(user);
    checkEmptySidebar();
  });

  socket.on("user_left", ({ id }) => {
    document.getElementById("ui-" + id)?.remove();
    checkEmptySidebar();
    if(activeChat && activeChat.id === id) {
      document.getElementById("chat-status").textContent = "çevrimdışı";
    }
  });

  socket.on("new_message", (msg) => {
    lastMessages[msg.from] = msg;
    updateUserPreview(msg.from, msg);
    if(activeChat && activeChat.id === msg.from) {
      appendMessage(msg, false);
    } else {
      unreadCounts[msg.from] = (unreadCounts[msg.from]||0) + 1;
      updateUnreadBadge(msg.from);
      // Bildirim sesi
      playNotif();
    }
  });

  socket.on("message_sent", (msg) => {
    lastMessages[msg.to] = msg;
    updateUserPreview(msg.to, msg);
    appendMessage(msg, true);
  });

  socket.on("history", ({ with: uid, messages: msgs }) => {
    const container = document.getElementById("messages");
    container.innerHTML = "";
    let lastDate = null;
    msgs.forEach(msg => {
      const d = formatDate(msg.time);
      if(d !== lastDate){
        const div = document.createElement("div");
        div.className="date-divider";
        div.innerHTML=`<span>${d}</span>`;
        container.appendChild(div);
        lastDate = d;
      }
      appendMessage(msg, msg.from === me.id);
    });
    container.scrollTop = container.scrollHeight;
  });

  socket.on("typing", ({ from, isTyping }) => {
    if(activeChat && activeChat.id === from) {
      const el = document.getElementById("typing-indicator");
      el.style.display = isTyping ? "block" : "none";
      el.textContent = isTyping ? activeChat.username + " yazıyor..." : "";
    }
  });

  // ── ARAMA EVENTLERİ ───────────────────────────────
  socket.on("call_ringing", ({ callId, to }) => {
    activeCallId = callId;
    showCallOverlay(to, "Çağrılıyor...", false);
  });

  socket.on("call_accepted", async ({ callId, by }) => {
    document.getElementById("call-status-text").textContent = "Bağlanıyor...";
    await startWebRTC(by, true);
  });

  socket.on("incoming_call", ({ callId, from, fromName }) => {
    activeCallId = callId;
    document.getElementById("incoming-name").textContent = fromName;
    document.getElementById("incoming-call").classList.add("show");

    document.getElementById("btn-accept-inc").onclick = async () => {
      document.getElementById("incoming-call").classList.remove("show");
      socket.emit("accept_call", { callId });
      showCallOverlay(from, "Bağlanıyor...", false);
      await startWebRTC(from, false);
    };

    document.getElementById("btn-reject-inc").onclick = () => {
      document.getElementById("incoming-call").classList.remove("show");
      socket.emit("reject_call", { callId });
      activeCallId = null;
    };
  });

  socket.on("call_ended", ({ callId, reason }) => {
    endCallUI(reason === "rejected" ? "Arama reddedildi." : "Arama bitti.");
  });

  // WebRTC sinyalleri
  socket.on("webrtc_offer", async ({ from, offer }) => {
    if(!peerConnection) await setupPeer(from, false);
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit("webrtc_answer", { to: from, answer });
    document.getElementById("call-status-text").textContent = "Bağlandı ✓";
  });

  socket.on("webrtc_answer", async ({ answer }) => {
    await peerConnection?.setRemoteDescription(new RTCSessionDescription(answer));
    document.getElementById("call-status-text").textContent = "Bağlandı ✓";
  });

  socket.on("webrtc_ice", ({ candidate }) => {
    peerConnection?.addIceCandidate(new RTCIceCandidate(candidate)).catch(()=>{});
  });
}

// ═══════════════════════════════════════════════════
//  WEBRTC
// ═══════════════════════════════════════════════════
async function startWebRTC(remoteId, isInitiator) {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    alert("Mikrofon izni gerekli! Lütfen izin ver.");
    endCallUI("Mikrofon hatası.");
    return;
  }
  await setupPeer(remoteId, isInitiator);
}

async function setupPeer(remoteId, isInitiator) {
  peerConnection = new RTCPeerConnection(ICE_SERVERS);

  localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));

  peerConnection.ontrack = (e) => {
    document.getElementById("remote-audio").srcObject = e.streams[0];
  };

  peerConnection.onicecandidate = (e) => {
    if(e.candidate) {
      socket.emit("webrtc_ice", { to: remoteId, candidate: e.candidate });
    }
  };

  peerConnection.onconnectionstatechange = () => {
    const s = peerConnection.connectionState;
    if(s === "connected") document.getElementById("call-status-text").textContent = "Bağlandı ✓";
    if(s === "failed" || s === "disconnected") endCallUI("Bağlantı kesildi.");
  };

  if(isInitiator) {
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit("webrtc_offer", { to: remoteId, offer });
  }
}

function endCallUI(reason) {
  document.getElementById("call-overlay").classList.remove("show");
  document.getElementById("incoming-call").classList.remove("show");
  peerConnection?.close();
  peerConnection = null;
  localStream?.getTracks().forEach(t => t.stop());
  localStream = null;
  document.getElementById("remote-audio").srcObject = null;
  activeCallId = null;
  isMuted = false;
  document.getElementById("btn-mute").textContent = "🎙️";
  document.getElementById("btn-mute").classList.remove("muted");
  if(reason) {
    const st = document.getElementById("chat-status");
    if(st) { st.textContent = "çevrimiçi"; }
  }
}

function showCallOverlay(userId, statusText, showAccept) {
  const overlay = document.getElementById("call-overlay");
  // İsim bul
  const el = document.getElementById("ui-" + userId);
  const name = el?.querySelector(".name")?.textContent || userId;
  document.getElementById("call-remote-name").textContent = name;
  document.getElementById("call-status-text").textContent = statusText;

  // Avatar
  const avatarEl = document.getElementById("call-avatar-big");
  const color = el?.querySelector(".avatar")?.style.background || "#6d28d9";
  avatarEl.style.background = color;
  avatarEl.textContent = initials(name);

  overlay.classList.add("show");
}

// ═══════════════════════════════════════════════════
//  UI FONKSIYONLARI
// ═══════════════════════════════════════════════════
function showApp(user) {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";

  const av = document.getElementById("my-avatar");
  makeAvatar(av, user.avatar, user.username);
  document.getElementById("my-name").textContent = user.username;
}

function renderUserItem(user) {
  const existing = document.getElementById("ui-" + user.id);
  if(existing) return;

  document.getElementById("empty-sidebar").style.display = "none";

  const el = document.createElement("div");
  el.className = "user-item";
  el.id = "ui-" + user.id;
  el.innerHTML = `
    <div class="avatar" style="background:${user.avatar}">
      ${initials(user.username)}
      <div class="status-ring"></div>
    </div>
    <div class="info">
      <div class="name">${escHtml(user.username)}</div>
      <div class="preview">Merhaba diyerek başla 👋</div>
    </div>
    <div class="meta">
      <span class="time"></span>
      <span class="unread-badge" style="display:none"></span>
    </div>
  `;
  el.addEventListener("click", () => openChat(user));
  document.getElementById("user-list").appendChild(el);
}

function updateUserPreview(userId, msg) {
  const el = document.getElementById("ui-" + userId);
  if(!el) return;
  el.querySelector(".preview").textContent = (msg.from===me.id?"Sen: ":"") + msg.text;
  el.querySelector(".time").textContent = formatTime(msg.time);
}

function updateUnreadBadge(userId) {
  const el = document.getElementById("ui-" + userId);
  if(!el) return;
  const badge = el.querySelector(".unread-badge");
  const count = unreadCounts[userId] || 0;
  if(count > 0) { badge.style.display="flex"; badge.textContent = count > 99 ? "99+" : count; }
  else { badge.style.display="none"; }
}

function checkEmptySidebar() {
  const hasPeople = document.querySelectorAll("#user-list .user-item").length > 0;
  document.getElementById("empty-sidebar").style.display = hasPeople ? "none" : "flex";
}

function openChat(user) {
  activeChat = user;

  // Mobilde sidebar'ı gizle
  document.getElementById("sidebar").classList.add("hidden");
  document.getElementById("chat-panel").classList.add("show");

  // Header
  document.getElementById("chat-header").style.display = "flex";
  const av = document.getElementById("chat-avatar");
  makeAvatar(av, user.avatar, user.username);
  document.getElementById("chat-name").textContent = user.username;
  document.getElementById("chat-status").textContent = "çevrimiçi";

  // Mesajlar
  document.getElementById("messages").style.display = "flex";
  document.getElementById("input-bar").style.display = "flex";
  document.getElementById("no-chat").style.display = "none";
  document.getElementById("typing-indicator").style.display = "none";

  // Aktif stili güncelle
  document.querySelectorAll(".user-item").forEach(e=>e.classList.remove("active"));
  document.getElementById("ui-"+user.id)?.classList.add("active");

  // Okunmamışları sıfırla
  unreadCounts[user.id] = 0;
  updateUnreadBadge(user.id);

  // Geçmişi iste
  socket.emit("get_history", { with: user.id });
}

function appendMessage(msg, isMine) {
  const container = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row " + (isMine ? "mine" : "theirs");
  row.innerHTML = `
    <div class="bubble">
      <div class="text">${escHtml(msg.text)}</div>
      <div class="meta"><span class="t">${formatTime(msg.time)}</span></div>
    </div>
  `;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if(!text || !activeChat) return;
  socket.emit("send_message", { to: activeChat.id, text });
  input.value = "";
  input.style.height = "auto";
  socket.emit("typing", { to: activeChat.id, isTyping: false });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br/>");
}

function playNotif() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(.15,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+.18);
  } catch(e){}
}

// ═══════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════
document.getElementById("login-btn").addEventListener("click", () => {
  const name = document.getElementById("username-input").value.trim();
  if(!name) return;
  connectSocket(name);
});
document.getElementById("username-input").addEventListener("keydown", e => {
  if(e.key==="Enter") document.getElementById("login-btn").click();
});

document.getElementById("send-btn").addEventListener("click", sendMsg);
document.getElementById("msg-input").addEventListener("keydown", e => {
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMsg(); }
});

// Yazıyor bildirimi
document.getElementById("msg-input").addEventListener("input", function() {
  // Otomatik yükseklik
  this.style.height="auto";
  this.style.height=Math.min(this.scrollHeight,120)+"px";
  if(!activeChat) return;
  socket.emit("typing", { to:activeChat.id, isTyping:true });
  clearTimeout(typingTimers[activeChat.id]);
  typingTimers[activeChat.id] = setTimeout(()=>{
    socket.emit("typing", { to:activeChat.id, isTyping:false });
  }, 2000);
});

// Geri butonu (mobil)
document.getElementById("back-btn").addEventListener("click", () => {
  document.getElementById("sidebar").classList.remove("hidden");
  document.getElementById("chat-panel").classList.remove("show");
  activeChat = null;
});

// Sesli arama başlat
document.getElementById("call-btn").addEventListener("click", () => {
  if(!activeChat) return;
  socket.emit("call_user", { to: activeChat.id });
});

// Aramayı kapat
document.getElementById("btn-end").addEventListener("click", () => {
  if(activeCallId) socket.emit("end_call", { callId:activeCallId });
  endCallUI("Arama bitti.");
});

// Sessiz
document.getElementById("btn-mute").addEventListener("click", function() {
  isMuted = !isMuted;
  localStream?.getAudioTracks().forEach(t => t.enabled = !isMuted);
  this.textContent = isMuted ? "🔇" : "🎙️";
  this.classList.toggle("muted", isMuted);
});
</script>
