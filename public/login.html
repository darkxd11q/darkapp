<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#111b21"/>
<title>ChatApp — Giriş</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100dvh;background:#111b21;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.card{
  background:#202c33;border-radius:20px;
  padding:44px 36px;width:min(420px,100%);
  box-shadow:0 24px 60px rgba(0,0,0,.5);
}
.logo{text-align:center;font-size:3.2rem;margin-bottom:10px;}
h1{text-align:center;color:#e9edef;font-size:1.5rem;margin-bottom:4px;}
.tagline{text-align:center;color:#8696a0;font-size:.85rem;margin-bottom:32px;}

.tabs{display:flex;background:#111b21;border-radius:10px;padding:4px;margin-bottom:28px;gap:4px;}
.tab{
  flex:1;padding:10px;background:none;border:none;color:#8696a0;
  font-size:.9rem;font-weight:600;cursor:pointer;border-radius:8px;
  transition:all .2s;line-height:1.4;
}
.tab.active{background:#202c33;color:#00a884;box-shadow:0 2px 8px rgba(0,0,0,.3);}

.form{display:none;flex-direction:column;gap:14px;}
.form.active{display:flex;}
.field-group{display:flex;flex-direction:column;gap:5px;}
label{color:#8696a0;font-size:.75rem;text-transform:uppercase;letter-spacing:.6px;}
input{
  padding:13px 16px;border-radius:10px;
  border:2px solid #2a3942;background:#2a3942;
  color:#e9edef;font-size:.95rem;outline:none;
  transition:border-color .2s;width:100%;
}
input:focus{border-color:#00a884;}
input::placeholder{color:#4a5568;}
.submit-btn{
  margin-top:4px;padding:14px;border-radius:10px;border:none;
  background:#00a884;color:#fff;font-size:1rem;font-weight:700;
  cursor:pointer;transition:background .2s;width:100%;
}
.submit-btn:hover{background:#02906f;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.err{
  background:#2d1515;border:1px solid #5c1f1f;border-radius:8px;
  padding:10px 14px;color:#f87171;font-size:.85rem;display:none;
}
.features{
  display:flex;justify-content:center;gap:24px;margin-top:24px;flex-wrap:wrap;
}
.feat{color:#8696a0;font-size:.75rem;display:flex;align-items:center;gap:5px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">💬</div>
  <h1>ChatApp</h1>
  <p class="tagline">Anlık mesajlaşma &amp; görüntülü arama</p>

  <div class="tabs">
    <button class="tab active" id="tab-login">Giriş Yap</button>
    <button class="tab"        id="tab-reg">Kayıt Ol</button>
  </div>

  <div class="form active" id="form-login">
    <div class="err" id="login-err"></div>
    <div class="field-group">
      <label for="login-email">E-posta</label>
      <input type="email" id="login-email" placeholder="ornek@mail.com" autocomplete="email" required/>
    </div>
    <div class="field-group">
      <label for="login-pw">Şifre</label>
      <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password" required/>
    </div>
    <button class="submit-btn" id="login-btn">Giriş Yap</button>
  </div>

  <div class="form" id="form-reg">
    <div class="err" id="reg-err"></div>
    <div class="field-group">
      <label for="reg-name">Adın</label>
      <input type="text" id="reg-name" placeholder="Adın Soyadın" maxlength="32" autocomplete="name" required/>
    </div>
    <div class="field-group">
      <label for="reg-email">E-posta</label>
      <input type="email" id="reg-email" placeholder="ornek@mail.com" autocomplete="email" required/>
    </div>
    <div class="field-group">
      <label for="reg-pw">Şifre (en az 6 karakter)</label>
      <input type="password" id="reg-pw" placeholder="••••••••" minlength="6" autocomplete="new-password" required/>
    </div>
    <button class="submit-btn" id="reg-btn">Hesap Oluştur</button>
  </div>

  <div class="features">
    <div class="feat">🔒 Güvenli</div>
    <div class="feat">📱 Mobil uyumlu</div>
    <div class="feat">🎥 Görüntülü arama</div>
    <div class="feat">⚡ Sıfır gecikme</div>
  </div>
</div>

<script>
(function () {
  // Tab switching
  document.getElementById('tab-login').addEventListener('click', function () {
    switchTab('login');
  });
  document.getElementById('tab-reg').addEventListener('click', function () {
    switchTab('reg');
  });

  function switchTab(tab) {
    var isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-reg').classList.toggle('active', !isLogin);
    document.getElementById('form-login').classList.toggle('active', isLogin);
    document.getElementById('form-reg').classList.toggle('active', !isLogin);
  }

  function showErr(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideErr(id) {
    document.getElementById(id).style.display = 'none';
  }

  // Enter key on login fields
  ['login-email', 'login-pw'].forEach(function (id) {
    document.getElementById(id).addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });
  });

  // Enter key on register fields
  ['reg-name', 'reg-email', 'reg-pw'].forEach(function (id) {
    document.getElementById(id).addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doRegister();
    });
  });

  // Login button
  document.getElementById('login-btn').addEventListener('click', doLogin);

  // Register button
  document.getElementById('reg-btn').addEventListener('click', doRegister);

  async function doLogin() {
    hideErr('login-err');
    var btn   = document.getElementById('login-btn');
    var email = document.getElementById('login-email').value.trim();
    var pw    = document.getElementById('login-pw').value;

    if (!email || !pw) {
      showErr('login-err', 'E-posta ve şifre girin.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Giriş yapılıyor...';

    try {
      var res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: pw })
      });
      var data = await res.json();
      if (data.ok) { location.href = '/'; return; }
      showErr('login-err', data.error || 'Giriş başarısız.');
    } catch (e) {
      showErr('login-err', 'Sunucuya ulaşılamadı.');
    }

    btn.disabled = false;
    btn.textContent = 'Giriş Yap';
  }

  async function doRegister() {
    hideErr('reg-err');
    var btn   = document.getElementById('reg-btn');
    var name  = document.getElementById('reg-name').value.trim();
    var email = document.getElementById('reg-email').value.trim();
    var pw    = document.getElementById('reg-pw').value;

    if (!name || !email || !pw) {
      showErr('reg-err', 'Tüm alanları doldurun.');
      return;
    }
    if (pw.length < 6) {
      showErr('reg-err', 'Şifre en az 6 karakter olmalı.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Kayıt yapılıyor...';

    try {
      var res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display_name: name, email: email, password: pw })
      });
      var data = await res.json();
      if (data.ok) { location.href = '/'; return; }
      showErr('reg-err', data.error || 'Kayıt başarısız.');
    } catch (e) {
      showErr('reg-err', 'Sunucuya ulaşılamadı.');
    }

    btn.disabled = false;
    btn.textContent = 'Hesap Oluştur';
  }
}());
</script>
</body>
</html>
