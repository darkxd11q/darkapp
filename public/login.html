<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#111b21"/>
<title>ChatApp — Giriş</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100dvh;background:#111b21;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.card{
  background:#202c33;border-radius:20px;
  padding:48px 36px;width:min(400px,100%);
  text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.5);
}
.logo{font-size:3.5rem;margin-bottom:12px;}
h1{color:#e9edef;font-size:1.6rem;font-weight:700;margin-bottom:6px;}
.tagline{color:#8696a0;font-size:.9rem;margin-bottom:36px;line-height:1.5;}
.features{
  display:flex;justify-content:center;gap:28px;
  margin-bottom:36px;flex-wrap:wrap;
}
.feat{color:#8696a0;font-size:.78rem;display:flex;flex-direction:column;align-items:center;gap:4px;}
.feat span:first-child{font-size:1.4rem;}
.divider{height:1px;background:#2a3942;margin:0 -36px 28px;}

.google-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:14px;border-radius:12px;border:none;
  background:#fff;color:#3c4043;font-size:.95rem;font-weight:600;
  cursor:pointer;text-decoration:none;transition:background .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.google-btn:hover{background:#f1f3f4;}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}

.or{color:#8696a0;font-size:.8rem;margin:20px 0;position:relative;}
.or::before,.or::after{
  content:"";position:absolute;top:50%;width:42%;height:1px;background:#2a3942;
}
.or::before{left:0;} .or::after{right:0;}

.demo-form{display:flex;flex-direction:column;gap:10px;}
.demo-form input{
  padding:13px 16px;border-radius:10px;border:2px solid #2a3942;
  background:#2a3942;color:#e9edef;font-size:.95rem;outline:none;
  transition:border-color .2s;
}
.demo-form input:focus{border-color:#00a884;}
.demo-form input::placeholder{color:#8696a0;}
.demo-btn{
  padding:13px;border-radius:10px;border:none;
  background:#00a884;color:#fff;font-size:.95rem;font-weight:600;
  cursor:pointer;transition:background .15s;
}
.demo-btn:hover{background:#02906f;}
.demo-btn:disabled{opacity:.5;cursor:not-allowed;}

.error{color:#f13838;font-size:.82rem;margin-top:8px;display:none;}
.no-oauth-note{color:#8696a0;font-size:.75rem;margin-top:6px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">💬</div>
  <h1>ChatApp</h1>
  <p class="tagline">Anlık mesajlaşma ve sıfır gecikmeli<br/>sesli arama uygulaması</p>

  <div class="features">
    <div class="feat"><span>🔒</span><span>Güvenli</span></div>
    <div class="feat"><span>📱</span><span>Mobil uyumlu</span></div>
    <div class="feat"><span>🌍</span><span>Dünyanın her yerinden</span></div>
    <div class="feat"><span>⚡</span><span>Sıfır gecikme</span></div>
  </div>

  <div class="divider"></div>

  <a id="google-btn" href="/auth/google" class="google-btn">
    <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.1 8.1 3l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.1 8.1 3l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.2C9.6 35.7 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.3 4.1-4.1 5.5l6.2 5.2C43 35.1 44 29.7 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>
    Google ile Giriş Yap
  </a>
  <p id="no-oauth-note" class="no-oauth-note" style="display:none">⚠️ Google OAuth ayarlanmamış — demo giriş kullan</p>

  <div class="or">veya</div>

  <div class="demo-form">
    <input type="text" id="demo-name" placeholder="Kullanıcı adın (demo için)" maxlength="24" autocomplete="off"/>
    <button class="demo-btn" id="demo-btn">Demo ile Giriş</button>
    <div class="error" id="err-msg">Bir hata oluştu, tekrar dene.</div>
  </div>
</div>

<script>
// URL'de error parametresi varsa
if(location.search.includes("error")) {
  document.getElementById("err-msg").style.display="block";
  document.getElementById("err-msg").textContent="Google girişi başarısız. Demo ile dene.";
}

// Google OAuth çalışıp çalışmadığını kontrol et
fetch("/auth/google", { method: "HEAD", redirect: "manual" }).then(r => {
  if(r.type === "opaqueredirect" || r.ok) {
    // OAuth mevcut
  }
}).catch(() => {
  document.getElementById("no-oauth-note").style.display="block";
});

document.getElementById("demo-btn").addEventListener("click", async () => {
  const name = document.getElementById("demo-name").value.trim();
  if(!name){ alert("Kullanıcı adı gerekli!"); return; }
  const btn = document.getElementById("demo-btn");
  btn.disabled = true; btn.textContent = "Giriş yapılıyor...";
  try {
    const res = await fetch("/auth/demo", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ name })
    });
    const data = await res.json();
    if(data.ok) location.href="/";
    else {
      document.getElementById("err-msg").textContent = data.error || "Hata";
      document.getElementById("err-msg").style.display="block";
    }
  } catch(e) {
    document.getElementById("err-msg").style.display="block";
  }
  btn.disabled = false; btn.textContent = "Demo ile Giriş";
});

document.getElementById("demo-name").addEventListener("keydown", e => {
  if(e.key==="Enter") document.getElementById("demo-btn").click();
});
</script>
</body>
</html>
